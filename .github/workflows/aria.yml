name: Build Aria for Linux

on: workflow_dispatch

jobs:
  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest
    container: debian:latest
    steps:
      - name: Install Basic Dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            curl \
            unzip \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            clang \
            gcc \
            g++ \
            libgtk-3-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            mesa-utils \
            mesa-common-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libblkid-dev \
            liblzma-dev \
            libsecret-1-dev \
            libjsoncpp-dev \
            libmpv-dev \
            mpv \
            llvm \
            llvm-dev \
            libllvm16 \
            libllvmspirvlib16-dev

      - name: Clone Repository
        run: git clone https://github.com/poppingmoon/aria.git .

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 /flutter
          echo "/flutter/bin" >> $GITHUB_PATH

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Run Code Generator
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Release (Software Rendering)
        run: |
          export LIBGL_ALWAYS_SOFTWARE=1
          export GALLIUM_DRIVER=llvmpipe
          flutter build linux --release

      - name: Create launcher script
        run: |
          echo '#!/bin/sh
          export LIBGL_ALWAYS_SOFTWARE=1
          export GALLIUM_DRIVER=llvmpipe
          ./aria "$@"' > build/linux/x64/release/bundle/launch_software.sh
          chmod +x build/linux/x64/release/bundle/launch_software.sh

      - name: Compress Bundle
        run: |
          tar -zcvf "aria-linux-bundle.tar.gz" \
          --directory=build/linux/x64/release/bundle .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria-linux-binaries
          path: "aria-linux-bundle.tar.gz"
