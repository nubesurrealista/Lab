name: Build audio-share Aport

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --privileged

    steps:
      - name: Install build system dependencies
        run: |
          apk update
          apk add --no-cache alpine-sdk sudo

      - name: Setup builder user
        run: |
          adduser -D -G abuild builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          mkdir -p /var/cache/distfiles
          chmod a+w /var/cache/distfiles
          chown builder:abuild /var/cache/distfiles

      - name: Prepare Aport directory
        run: |
          mkdir -p /home/builder/aports/testing/audio-share
          chown -R builder:abuild /home/builder/aports

      - name: Create Compatibility Patch
        run: |
          printf -- "---\ a/server-core/CMakeLists.txt\r\n" > /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "+++\ b/server-core/CMakeLists.txt\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "@@ -1,5 +1,8 @@\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- " cmake_minimum_required(VERSION 3.15)\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- " project(audio-share-server-core)\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "+\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "+set(protobuf_MODULE_COMPATIBLE TRUE)\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "+set(Protobuf_PROTOC_EXECUTABLE /usr/bin/protoc)\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- " \r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- " find_package(Threads REQUIRED)\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- " find_package(pipewire REQUIRED)\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "@@ -7,7 +10,13 @@\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- " find_package(spdlog CONFIG REQUIRED)\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- " find_package(cxxopts CONFIG REQUIRED)\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "-find_package(asio CONFIG REQUIRED)\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "+\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "+find_path(ASIO_INCLUDE_DIR NAMES asio.hpp)\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "+if(ASIO_INCLUDE_DIR)\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "+  add_library(asio::asio INTERFACE IMPORTED)\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "+  target_include_directories(asio::asio INTERFACE \${ASIO_INCLUDE_DIR})\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "+else()\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "+  message(FATAL_ERROR \"asio.hpp not found\")\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          printf -- "+endif()\r\n" >> /home/builder/aports/testing/audio-share/fix-cmake.patch
          chown builder:abuild /home/builder/aports/testing/audio-share/fix-cmake.patch

      - name: Create APKBUILD
        run: |
          cat > /home/builder/aports/testing/audio-share/APKBUILD << 'EOF'
          # Maintainer: Nube <nubesu@tuta.io>
          pkgname=audio-share
          pkgver=0.3.4
          pkgrel=0
          pkgdesc="Share system audio to Android devices via network"
          url="https://github.com/mkckr0/audio-share"
          arch="x86_64"
          license="Apache-2.0"
          makedepends="cmake ninja build-base pkgconf pipewire-dev protobuf-dev protoc spdlog-dev cxxopts-dev asio-dev"
          source="$pkgname-$pkgver.tar.gz::https://github.com/mkckr0/audio-share/archive/refs/tags/v$pkgver.tar.gz
          	fix-cmake.patch"
          builddir="$srcdir/$pkgname-$pkgver"

          prepare() {
          	default_prepare
          }

          build() {
          	cd "$builddir"/server-core
          	cmake -B build \
          		-G Ninja \
          		-DCMAKE_BUILD_TYPE=Release \
          		-DAUDIO_SHARE_STATIC_LIBCPP=OFF
          	cmake --build build --target server-cmd
          }

          package() {
          	cd "$builddir"/server-core
          	install -Dm755 build/as-cmd "$pkgdir"/usr/bin/as-cmd
          }
          EOF
          chown builder:abuild /home/builder/aports/testing/audio-share/APKBUILD

      - name: Build and Verify Aport
        shell: su builder -s /bin/sh {0}
        run: |
          cd ~/aports/testing/audio-share
          abuild-keygen -an
          abuild checksum
          abuild -r

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audio-share-aport-bundle
          path: |
            /home/builder/aports/testing/audio-share/APKBUILD
            /home/builder/aports/testing/audio-share/*.patch
            /home/builder/packages/testing/**/audio-share-*.apk
