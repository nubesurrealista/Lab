---
name: Build audio-share Aport
on:
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: '--privileged'
    steps:
      - name: Install build system dependencies
        run: |
          apk update
          apk add --no-cache alpine-sdk doas
      - name: Setup builder user
        run: |
          adduser -D -G abuild builder
          echo "permit nopass :abuild as root" > /etc/doas.conf
          mkdir -p /var/cache/distfiles
          chmod a+w /var/cache/distfiles
          chown builder:abuild /var/cache/distfiles
      - name: Prepare Aport directory
        run: |
          mkdir -p /home/builder/aports/testing/audio-share
          chown -R builder:abuild /home/builder/aports
      - name: Generate correct patch dynamically
        run: |
          PKGVER=0.3.4
          TARBALL="audio-share-$PKGVER.tar.gz"
          URL="https://github.com/mkckr0/audio-share/archive/refs/tags/v$PKGVER.tar.gz"
          wget -O "/tmp/$TARBALL" "$URL"
          cd /tmp
          tar xzf "$TARBALL"
          mkdir -p a/server-core b/server-core
          cp "audio-share-$PKGVER/server-core/CMakeLists.txt" a/server-core/
          cp "audio-share-$PKGVER/server-core/CMakeLists.txt" b/server-core/
          cd b/server-core
          sed -i '/^project(/a\
          set(protobuf_MODULE_COMPATIBLE TRUE)\
          set(Protobuf_PROTOC_EXECUTABLE /usr/bin/protoc)
          ' CMakeLists.txt
          sed -i '/find_package(asio CONFIG REQUIRED)/c\
          find_path(ASIO_INCLUDE_DIR NAMES asio.hpp)\
          if(ASIO_INCLUDE_DIR)\
            add_library(asio::asio INTERFACE IMPORTED)\
            target_include_directories(asio::asio INTERFACE ${ASIO_INCLUDE_DIR})\
          else()\
            message(FATAL_ERROR "asio.hpp not found")\
          endif()
          ' CMakeLists.txt
          cd ../..
          diff -u a/server-core/CMakeLists.txt b/server-core/CMakeLists.txt > fix-cmake.patch
          mv fix-cmake.patch /home/builder/aports/testing/audio-share/
          chown builder:abuild /home/builder/aports/testing/audio-share/fix-cmake.patch
          rm -rf /tmp/audio-share-$PKGVER /tmp/a /tmp/b /tmp/$TARBALL
      - name: Create APKBUILD
        run: "cat > /home/builder/aports/testing/audio-share/APKBUILD << 'EOF'\n# Maintainer: Nube <nubesu@tuta.io>\npkgname=audio-share\npkgver=0.3.4\npkgrel=0\npkgdesc=\"Share system audio to Android devices via network\"\nurl=\"https://github.com/mkckr0/audio-share\"\narch=\"x86_64\"\nlicense=\"Apache-2.0\"\nmakedepends=\"cmake ninja build-base pkgconf pipewire-dev protobuf-dev protoc spdlog-dev cxxopts-dev asio-dev\"\nsource=\"$pkgname-$pkgver.tar.gz::https://github.com/mkckr0/audio-share/archive/refs/tags/v$pkgver.tar.gz\n\tfix-cmake.patch\"\nbuilddir=\"$srcdir/$pkgname-$pkgver\"\n\nprepare() {\n\tdefault_prepare\n}\n\nbuild() {\n\tcd \"$builddir\"/server-core\n\tcmake -B build \\\n\t\t-G Ninja \\\n\t\t-DCMAKE_BUILD_TYPE=Release \\\n\t\t-DAUDIO_SHARE_STATIC_LIBCPP=OFF\n\tcmake --build build --target server-cmd\n}\n\npackage() {\n\tcd \"$builddir\"/server-core\n\tinstall -Dm755 build/as-cmd \"$pkgdir\"/usr/bin/as-cmd\n}\nEOF\nchown builder:abuild /home/builder/aports/testing/audio-share/APKBUILD\n"
      - name: Build and Verify Aport
        shell: su builder -s /bin/sh {0}
        run: |
          cd ~/aports/testing/audio-share
          abuild-keygen -an
          abuild checksum
          abuild -r
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: audio-share-aport-bundle
          path: |
            /home/builder/aports/testing/audio-share/APKBUILD
            /home/builder/aports/testing/audio-share/*.patch
            /home/builder/packages/testing/**/audio-share-*.apk
