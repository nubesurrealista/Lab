name: Kumo generate locales only

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v6

      - name: Clone Kumo source
        run: |
          git clone --branch test https://github.com/nubesurrealista/Kumo.git

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate Locales Config
        run: |
          cd Kumo
          ./gradlew :i18n:generateLocalesConfig \
            --no-build-cache \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace

      - name: Upload Locales Config
        uses: actions/upload-artifact@v4
        with:
          name: locales-config-file
          path: Kumo/**/locales_config.xml
