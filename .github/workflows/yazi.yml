---
name: Build Yazi Latest for Android ARMv7
on:
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true
          local-cache: true
      - name: Clone Yazi repository (Latest)
        run: |
          git clone https://github.com/sxyazi/yazi.git
          cd yazi
      - name: Build Yazi for Android ARMv7
        working-directory: yazi
        env:
          RUSTFLAGS: '-C target-feature=+crt-static'
          CFLAGS: '-D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64'
        run: |
          cargo ndk \
            -t armeabi-v7a \
            -p 24 \
            build --release --locked --bin yazi
          ls -la target/armv7-linux-androideabi/release/yazi
          file target/armv7-linux-androideabi/release/yazi
      - name: Strip
        working-directory: yazi
        run: |
          ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
            target/armv7-linux-androideabi/release/yazi || true
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: yazi-android-armv7-latest
          path: yazi/target/armv7-linux-androideabi/release/yazi
          if-no-files-found: error
