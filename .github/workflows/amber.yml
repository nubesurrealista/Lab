---
name: Build Mesa Amber
on:
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: '--user root'
    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache \
            build-base meson ninja patch python3 py3-mako py3-packaging \
            pkgconf libdrm-dev libx11-dev libxdamage-dev libxshmfence-dev \
            libxxf86vm-dev libxrandr-dev zstd-dev elfutils-dev expat-dev \
            bison flex curl tar xz mesa-dev libxfixes-dev libxcb-dev libxml2-dev
      - name: Fetch and Extract Legacy LLVM 12
        run: |
          MIRROR="https://dl-cdn.alpinelinux.org/alpine/v3.16/community/x86_64"
          mkdir -p /opt/llvm12
          curl -L "$MIRROR/llvm12-12.0.1-r3.apk" -o llvm.apk
          curl -L "$MIRROR/llvm12-libs-12.0.1-r3.apk" -o llvm-libs.apk
          curl -L "$MIRROR/llvm12-dev-12.0.1-r3.apk" -o llvm-dev.apk
          curl -L "$MIRROR/llvm12-static-12.0.1-r3.apk" -o llvm-static.apk
          tar -xf llvm.apk -C /opt/llvm12
          tar -xf llvm-libs.apk -C /opt/llvm12
          tar -xf llvm-dev.apk -C /opt/llvm12
          tar -xf llvm-static.apk -C /opt/llvm12
          /opt/llvm12/usr/lib/llvm12/bin/llvm-config --version
      - name: Download and Patch Mesa
        run: |
          curl -L https://archive.mesa3d.org/older-versions/21.x/mesa-21.3.9.tar.xz -o mesa.tar.xz
          tar -xf mesa.tar.xz
          mv mesa-21.3.9 mesa-src
          curl -L "https://gitlab.archlinux.org/archlinux/packaging/packages/mesa-amber/-/raw/main/mesa-amber-21.3.9-meson-Support-for-both-packaging-and-distutils.patch" -o fix.patch
          patch -Np1 -d mesa-src -i ../fix.patch
      - name: Configure
        run: |
          cd mesa-src
          export CFLAGS="-march=core2 -mtune=core2 -msse4.1 -O2 -D_GNU_SOURCE"
          export CXXFLAGS="-march=core2 -mtune=core2 -msse4.1 -O2 -D_GNU_SOURCE"
          export LDFLAGS="-L/opt/llvm12/usr/lib/llvm12/lib"

          meson setup build \
            --prefix=/usr \
            --buildtype=release \
            -D b_ndebug=true \
            -D b_lto=false \
            -D b_staticpic=true \
            -D amber=true \
            -D dri-drivers=[] \
            -D gallium-drivers=i915,swrast \
            -D dri3=disabled \
            -D egl=enabled \
            -D gbm=enabled \
            -D gles1=disabled \
            -D gles2=enabled \
            -D glvnd=false \
            -D glx=dri \
            -D glx-direct=true \
            -D llvm=enabled \
            -D shared-llvm=disabled \
            -D llvm-config="/opt/llvm12/usr/lib/llvm12/bin/llvm-config" \
            -D platforms=x11 \
            -D shared-glapi=enabled \
            -D vulkan-drivers=[] \
            -D c_args="$CFLAGS" \
            -D cpp_args="$CXXFLAGS"
      - name: Compile and Package
        run: |
          cd mesa-src
          export LD_LIBRARY_PATH="/opt/llvm12/usr/lib/llvm12/lib:$LD_LIBRARY_PATH"
          meson compile -C build
          mkdir -p ../output
          DESTDIR=$(pwd)/../output meson install -C build
          cd ../output && tar -czf ../mesa-amber-binaries.tar.gz .
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mesa-amber-e8400-portable
          path: mesa-amber-binaries.tar.gz
