---
name: Build Mesa Amber Alpine (Optimized)
on:
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: '--user root'
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            build-base meson ninja patch python3 py3-mako py3-packaging \
            pkgconf libdrm-dev libx11-dev libxdamage-dev libxshmfence-dev \
            libxxf86vm-dev libxrandr-dev zstd-dev elfutils-dev expat-dev \
            bison flex curl tar xz mesa-dev libxfixes-dev libxcb-dev
      - name: Download and Patch
        run: |
          curl -L https://archive.mesa3d.org/older-versions/21.x/mesa-21.3.9.tar.xz -o mesa.tar.xz
          tar -xf mesa.tar.xz
          mv mesa-21.3.9 mesa-src
          curl -L "https://gitlab.archlinux.org/archlinux/packaging/packages/mesa-amber/-/raw/main/mesa-amber-21.3.9-meson-Support-for-both-packaging-and-distutils.patch" -o fix.patch
          patch -Np1 -d mesa-src -i ../fix.patch
      - name: Configure
        run: |
          cd mesa-src
          export CFLAGS="-march=core2 -mtune=core2 -O3 -pipe -fomit-frame-pointer"
          export CXXFLAGS="-march=core2 -mtune=core2 -O3 -pipe -fomit-frame-pointer"

          meson setup build \
            --prefix=/usr \
            --buildtype=release \
            -D b_ndebug=true \
            -D b_lto=true \
            -D b_staticpic=true \
            -D amber=true \
            -D dri3=disabled \
            -D egl=enabled \
            -D gallium-drivers=i915,swrast \
            -D gbm=enabled \
            -D gles1=disabled \
            -D gles2=enabled \
            -D glvnd=false \
            -D glx=dri \
            -D glx-direct=true \
            -D llvm=disabled \
            -D platforms=x11 \
            -D shared-glapi=enabled \
            -D vulkan-drivers=[] \
            -D c_args="$CFLAGS" \
            -D cpp_args="$CXXFLAGS"
      - name: Compile and Package
        run: |
          cd mesa-src
          meson compile -C build
          mkdir -p ../output
          DESTDIR=$(pwd)/../output meson install -C build
          cd ../output && find . -type f -executable -exec strip {} \; 2>/dev/null || true
          cd .. && tar -czf mesa-amber-binaries.tar.gz -C output .
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: mesa-amber-e8400-optimized
          path: mesa-amber-binaries.tar.gz
