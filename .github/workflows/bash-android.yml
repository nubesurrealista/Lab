name: Build Android Bash ARMv7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone
        run: git clone https://github.com/Sonelli/android-bash.git .

      - name: Build
        run: docker build -t sonelli/android-bash .

      - name: Prep
        run: |
          mkdir -p output
          chmod 777 output

      - name: Run
        run: docker run --name bash_builder -v $(pwd)/output:/target sonelli/android-bash || true

      - name: Inspect
        run: |
          find output -name "bash" -executable
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: bash-android-armv7
          path: output/armv7a/pie/bash
          if-no-files-found: error
