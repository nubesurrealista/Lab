name: Build RSS Guard (Linux - Lite - Release)

on:
  workflow_dispatch:  # Permite ejecución manual cuando quieras
  push:
    tags:
      - 'v*'  # Opcional: También se activa al crear un tag (ej. v5.0.0)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive  # Necesario para dependencias

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          git \
          libsqlite3-dev \
          libgl1-mesa-dev \
          libmpv-dev \
          qt6-base-dev \
          qt6-multimedia-dev \
          qt6-qml-dev \
          qt6-tools-dev \
          zlib1g-dev

    - name: Configure and build (Release + Multimedia)
      run: |
        mkdir -p build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DBUILD_WITH_QT6=ON \
          -DNO_LITE=OFF \
          -DENABLE_MEDIAPLAYER_LIBMPV=ON \  # Multimedia activada por defecto
          -DUSE_SYSTEM_SQLITE=ON
        cmake --build . --parallel $(nproc)

    - name: Run basic test
      run: |
        cd build
        ./src/rssguard/rssguard --version

    - name: Package and upload artifact
      run: |
        mkdir -p artifacts
        cp build/src/rssguard/rssguard artifacts/
        strip artifacts/rssguard  # Optimiza el binario
        tar czvf rssguard-lite-linux-release.tar.gz -C artifacts .
        
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: rssguard-lite-linux-release
        path: rssguard-lite-linux-release.tar.gz