name: Build RSS Guard (Linux - Lite - Release)

on:
  workflow_dispatch:  # Ejecución manual
  push:
    tags:
      - 'v*'  # Opcional: Se activa con tags (ej. v5.0.0)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          git \
          libsqlite3-dev \
          libgl1-mesa-dev \
          libmpv-dev \
          qt6-base-dev \
          qt6-multimedia-dev \
          qt6-qml-dev \
          qt6-tools-dev \
          zlib1g-dev

    - name: Configure and build (Release + Multimedia)
      run: |
        mkdir -p build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DBUILD_WITH_QT6=ON \
          -DNO_LITE=OFF \
          -DENABLE_MEDIAPLAYER_LIBMPV=ON \
          -DUSE_SYSTEM_SQLITE=ON
        cmake --build . --parallel $(nproc)

    - name: Run basic test
      run: |
        cd build
        ./src/rssguard/rssguard --version

    - name: Package artifact
      run: |
        mkdir -p artifacts
        cp build/src/rssguard/rssguard artifacts/
        strip artifacts/rssguard
        tar czvf rssguard-lite-linux-release.tar.gz -C artifacts .

    - name: Upload artifact
      uses: actions/upload-artifact@v4  # Versión actualizada
      with:
        name: rssguard-lite-linux-release
        path: rssguard-lite-linux-release.tar.gz
        retention-days: 7  # Opcional: Borra el artifact después de 7 días