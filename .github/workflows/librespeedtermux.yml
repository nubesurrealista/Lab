name: Build Librespeed CLI (armv7 Edition)
on:
  workflow_dispatch: null
jobs:
  build-librespeed:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Clone and Build Librespeed-CLI
        run: |
          git clone https://github.com/librespeed/speedtest-cli
          cd speedtest-cli
          chmod +x build.sh
          GOOS=linux GOARCH=arm GOARM=7 ./build.sh
          ls -R out/
      - name: Upload Librespeed Binary
        uses: actions/upload-artifact@v7
        with:
          name: librespeed-cli-termux-armv7
          path: speedtest-cli/out/librespeed-cli-*
