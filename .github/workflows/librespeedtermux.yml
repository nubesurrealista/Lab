name: Build Librespeed CLI (Termux armv7 Edition)
on:
  workflow_dispatch: null
jobs:
  build-librespeed:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install UPX
        run: sudo apt update && sudo apt install -y upx
      - name: Download Android NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip -O ndk.zip
          unzip -q ndk.zip
          mv android-ndk-r25c $HOME/android-ndk
          echo "ANDROID_NDK_HOME=$HOME/android-ndk" >> $GITHUB_ENV
      - name: Clone and Build Librespeed-CLI (bionic-linked for Termux)
        run: |
          git clone https://github.com/librespeed/speedtest-cli
          cd speedtest-cli
          chmod +x build.sh
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          export CGO_ENABLED=1
          export CC=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          export CGO_CFLAGS="--sysroot=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot -target armv7a-linux-androideabi21 -isystem ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include -isystem ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/arm-linux-androideabi"
          export CGO_CPPFLAGS="$CGO_CFLAGS"
          export CGO_LDFLAGS="--sysroot=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          ./build.sh
          ls -R out/
      - name: Upload Librespeed Binary
        uses: actions/upload-artifact@v7
        with:
          name: librespeed-cli-termux-armv7
          path: speedtest-cli/out/librespeed-cli-*
