name: Build Decker Native on Alpine musl

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: alpine:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          apk update
          apk add --no-cache build-base sdl2-dev sdl2_image-dev make xxd

      - name: Compile lilt and decker
        run: |
          make lilt
          make decker

      - name: Basic verification
        run: |
          ./lilt -e 'print "Lil interpreter OK"'
          file ./decker
          ./decker --version || true

      - name: Upload binaries as artifact
        uses: actions/upload-artifact@v7
        with:
          name: decker-alpine-musl-binaries
          path: |
            decker
            lilt
          if-no-files-found: warn
