name: Build Decker Native on Alpine
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - name: Checkout Decker repository
        uses: actions/checkout@v6
        with:
          repository: JohnEarnest/Decker

      - name: Install build dependencies
        run: |
          apk update
          apk add --no-cache build-base sdl2-dev sdl2_image-dev xxd

      - name: Compile lilt and decker
        run: |
          make lilt
          make decker

      - name: Quick verification
        run: |
          ./c/build/lilt -e 'print "Lilt Build: OK"'

      - name: Upload binaries as artifact
        uses: actions/upload-artifact@v7
        with:
          name: decker-alpine-musl-binaries
          path: |
            c/build/decker
            c/build/lilt
          if-no-files-found: warn
