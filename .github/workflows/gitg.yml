name: Enviar artefacto comprimido a Telegram

on:
  workflow_dispatch:
    inputs:
      external_repo:
        description: 'Repo externo (ej. usuario/proyecto)'
        required: true
        type: string
      run_id:
        description: 'ID del run que generó el artefacto'
        required: true
        type: string
      artifact_name:
        description: 'Nombre exacto del artefacto'
        required: true
        type: string

jobs:
  enviar:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Obtener lista de artefactos
      id: obtener_artifact
      run: |
        echo "🔎 Buscando '${{ inputs.artifact_name }}' en run_id=${{ inputs.run_id }} del repo '${{ inputs.external_repo }}'"

        curl -s \
          -H "Authorization: token ${{ secrets.GH_PAT_CROSS }}" \
          https://api.github.com/repos/${{ inputs.external_repo }}/actions/runs/${{ inputs.run_id }}/artifacts \
          > artifacts.json

        ARTIFACT_ID=$(jq -r '.artifacts[] | select(.name == "'${{ inputs.artifact_name }}'") | .id' artifacts.json)

        if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" == "null" ]; then
          echo "❌ Artefacto no encontrado, abortando"
          exit 1
        fi

        echo "✅ Artefacto encontrado: ID $ARTIFACT_ID"
        echo "::set-output name=artifact_id::$ARTIFACT_ID"

    - name: 📦 Descargar artefacto ZIP
      run: |
        ARTIFACT_ID="${{ steps.obtener_artifact.outputs.artifact_id }}"
        curl -L \
          -H "Authorization: token ${{ secrets.GH_PAT_CROSS }}" \
          https://api.github.com/repos/${{ inputs.external_repo }}/actions/artifacts/$ARTIFACT_ID/zip \
          -o raw_artifact.zip

    - name: 🗜️ Comprimir usando xz (nivel máximo)
      run: |
        tar -cf telegram.tar raw_artifact.zip
        xz -9 -T0 telegram.tar
        mv telegram.tar.xz compressed_artifact.xz
        echo "📏 Tamaño final:"
        du -h compressed_artifact.xz

    - name: 🚀 Enviar por Telegram
      run: |
        SIZE=$(stat -c%s compressed_artifact.xz)
        LIMIT=$((50 * 1024 * 1024))

        if [ "$SIZE" -gt "$LIMIT" ]; then
          echo "❌ Archivo demasiado grande para Telegram (>$((SIZE / 1024 / 1024)) MB)"
          exit 1
        fi

        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -F document=@compressed_artifact.xz