name: Enviar artefacto desde repo externo a Telegram

on:
  workflow_dispatch:
    inputs:
      external_repo:
        description: 'Nombre del repositorio (ej. usuario/proyecto)'
        required: true
        type: string
      run_id:
        description: 'ID del run que generó el artefacto'
        required: true
        type: string
      artifact_name:
        description: 'Nombre exacto del artefacto'
        required: true
        type: string

jobs:
  enviar:
    runs-on: ubuntu-latest

    steps:
    - name: 🧾 Obtener artefactos desde ${{ inputs.external_repo }}
      id: obtener_artifact
      run: |
        echo "🔍 Buscando artefacto '${{ inputs.artifact_name }}' en run_id=${{ inputs.run_id }} del repo '${{ inputs.external_repo }}'"

        curl -s \
          -H "Authorization: token ${{ secrets.GH_PAT_CROSS }}" \
          https://api.github.com/repos/${{ inputs.external_repo }}/actions/runs/${{ inputs.run_id }}/artifacts \
          > artifacts.json

        echo "📜 Artefactos disponibles:"
        cat artifacts.json | jq '.artifacts | map({name, id})'

        ARTIFACT_ID=$(jq -r '.artifacts[] | select(.name == "'${{ inputs.artifact_name }}'") | .id' artifacts.json)

        if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" == "null" ]; then
          echo "❌ Artefacto no encontrado. Revisa el nombre y el run_id."
          exit 1
        fi

        echo "::set-output name=artifact_id::$ARTIFACT_ID"

    - name: 📦 Descargar artefacto
      run: |
        ARTIFACT_ID="${{ steps.obtener_artifact.outputs.artifact_id }}"
        curl -L \
          -H "Authorization: token ${{ secrets.GH_PAT_CROSS }}" \
          https://api.github.com/repos/${{ inputs.external_repo }}/actions/artifacts/$ARTIFACT_ID/zip \
          -o artifact.zip

    - name: 📤 Enviar artefacto ZIP por Telegram
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -F document=@artifact.zip