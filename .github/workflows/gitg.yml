name: Enviar artefacto dividido a Telegram

on:
  workflow_dispatch:
    inputs:
      external_repo:
        description: 'Repo externo (ej. usuario/proyecto)'
        required: true
        type: string
      run_id:
        description: 'ID del run que generó el artefacto'
        required: true
        type: string
      artifact_name:
        description: 'Nombre del artefacto'
        required: true
        type: string

jobs:
  enviar_a_telegram:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Buscar artefacto en ejecución externa
      id: obtener
      run: |
        curl -s \
          -H "Authorization: token ${{ secrets.GH_PAT_CROSS }}" \
          https://api.github.com/repos/${{ inputs.external_repo }}/actions/runs/${{ inputs.run_id }}/artifacts \
          > artifacts.json

        ARTIFACT_ID=$(jq -r '.artifacts[] | select(.name == "'${{ inputs.artifact_name }}'") | .id' artifacts.json)

        if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" == "null" ]; then
          echo "❌ Artefacto '${{ inputs.artifact_name }}' no encontrado"
          exit 1
        fi

        echo "::set-output name=artifact_id::$ARTIFACT_ID"

    - name: 📦 Descargar artefacto
      run: |
        ARTIFACT_ID="${{ steps.obtener.outputs.artifact_id }}"
        curl -L \
          -H "Authorization: token ${{ secrets.GH_PAT_CROSS }}" \
          https://api.github.com/repos/${{ inputs.external_repo }}/actions/artifacts/$ARTIFACT_ID/zip \
          -o full_artifact.zip

    - name: ✂️ Dividir archivo en partes de <50MB
      run: |
        split -b 49M full_artifact.zip part_
        mv part_aa part1.zip
        mv part_ab part2.zip
        mv part_ac part3.zip
        echo "✅ Archivo dividido en:"
        ls -lh part*.zip

    - name: 🚀 Enviar parte 1
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -F document=@part1.zip \
          -F caption="Parte 1 de 3: '${{ inputs.artifact_name }}'"

    - name: 🕒 Pausa breve
      run: sleep 5

    - name: 🚀 Enviar parte 2
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -F document=@part2.zip \
          -F caption="Parte 2 de 3: '${{ inputs.artifact_name }}'"

    - name: 🕒 Pausa breve
      run: sleep 5

    - name: 🚀 Enviar parte 3
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -F document=@part3.zip \
          -F caption="Parte 3 de 3: '${{ inputs.artifact_name }}'"