---
name: Build nnn for Android ARMv7
on:
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true
          local-cache: true
      - name: Clone nnn repository (Latest)
        run: |
          git clone https://github.com/jarun/nnn.git
          cd nnn
      - name: Build nnn for Android ARMv7
        working-directory: nnn
        run: |
          # Configuramos el compilador del NDK para ARMv7
          export CC=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi24-clang

          # Compilación estática para evitar dependencias de librerías dinámicas
          make LDFLAGS="-static" -j$(nproc)

          ls -la nnn
          file nnn
      - name: Strip el binario
        working-directory: nnn
        run: |
          ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
            nnn || true
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nnn-android-armv7
          path: nnn/nnn
          if-no-files-found: error
