name: Build HyFetch (Debian, minimal)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: debian:stable-slim

    steps:
      - name: 📦 Install dependencies
        run: |
          apt update
          apt install -y \
            git curl build-essential \
            libssl-dev pkg-config \
            libclang-dev clang \
            make gcc \
            rustc cargo

      - name: 📥 Clone HyFetch
        run: |
          git clone https://github.com/hykilpikonna/hyfetch.git
          cd hyfetch
          cargo build --release

      - name: 📤 Upload HyFetch binary
        uses: actions/upload-artifact@v4
        with:
          name: hyfetch
          path: hyfetch/target/release/hyfetch
