name: Build HyFetch (Debian, clean)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: debian:stable-slim

    steps:
      - name: 📦 Install build dependencies
        run: |
          apt update
          apt install -y \
            git curl build-essential \
            libssl-dev pkg-config \
            libclang-dev clang \
            make gcc \
            rustc cargo

      - name: 📥 Clone HyFetch repository
        run: |
          git clone https://github.com/hykilpikonna/hyfetch.git

      - name: 🏗️ Build HyFetch (release)
        working-directory: hyfetch
        run: cargo build --release

      - name: 📤 Upload HyFetch binary
        uses: actions/upload-artifact@v4
        with:
          name: hyfetch
          path: hyfetch/target/release/hyfetch
