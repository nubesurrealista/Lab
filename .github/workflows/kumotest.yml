name: Kumo locales config diagnostic

on:
  workflow_dispatch:

jobs:
  diagnostic:
    runs-on: ubuntu-latest

    steps:
      - name: Clone Kumo source
        run: |
          git clone --branch test https://github.com/nubesurrealista/Kumo.git

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate locales config + find exact path
        run: |
          cd Kumo

          echo "=== 1. Listando tareas relacionadas con locales ==="
          ./gradlew :i18n:tasks --all | grep -iE 'locale|locales|config' || echo "No se encontraron tareas con 'locale'"

          echo "=== 2. Ejecutando generación de locales_config.xml ==="
          ./gradlew :i18n:generateLocalesConfig --stacktrace --console=plain || echo "⚠️ La tarea :i18n:generateLocalesConfig no existe (intentaremos alternativa)"

          echo "=== 3. Búsqueda exhaustiva del archivo locales_config.xml ==="
          echo "Rutas encontradas:"
          find . -name "locales_config.xml" -type f -exec echo "→ {}" \; -exec cat {} \;

          echo "=== 4. Ruta exacta del directorio generado (según tu build logic) ==="
          find build -path "*/android/res/xml" -type d 2>/dev/null || echo "No se encontró carpeta android/res/xml generada"

          echo "=== 5. Contenido completo de generated dirs (para ver generatedAndroidResourceDir) ==="
          find . -path "*/generated/*" -name "*.xml" | head -20 || echo "No hay archivos XML generados"
