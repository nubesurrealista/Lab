name: Kumo Direct Path Build
on:
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v6
      - name: Clone Kumo source
        run: |
          git clone --branch test https://github.com/nubesurrealista/Kumo.git
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Link Generated Resources to App
        run: |
          cat <<EOF >> Kumo/app/build.gradle.kts

          android {
              sourceSets.getByName("main") {
                  res.srcDirs("../i18n/build/generated/mihon/android/res")
              }
          }

          tasks.configureEach {
              if (name.startsWith("process") && name.endsWith("Resources")) {
                  dependsOn(project(":i18n").tasks.matching { it.name == "generateLocalesConfig" })
              }
          }
          EOF
      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 -d > Kumo/app/nube.p12
      - name: Build release APKs
        run: |
          cd Kumo
          ./gradlew clean assembleRelease \
            --stacktrace \
            --parallel \
            --max-workers=$(nproc) \
            --no-build-cache \
            --no-daemon
      - name: Sign APKs
        run: |
          ANDROID_BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -n1)"
          for arch in armeabi-v7a arm64-v8a; do
            UNSIGNED="Kumo/app/build/outputs/apk/release/app-$arch-release-unsigned.apk"
            SIGNED="Kumo/app/build/outputs/apk/release/kumo-$arch-test.apk"
            if [ -f "$UNSIGNED" ]; then
              "$ANDROID_BUILD_TOOLS/apksigner" sign \
                --ks Kumo/app/nube.p12 \
                --ks-key-alias "${{ secrets.RELEASE_KEY_ALIAS }}" \
                --ks-pass pass:"${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" \
                --key-pass pass:"${{ secrets.RELEASE_KEY_PASSWORD }}" \
                --v2-signing-enabled true \
                --v3-signing-enabled true \
                --out "$SIGNED" \
                "$UNSIGNED"
            fi
          done
      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: kumo-test-builds
          path: Kumo/app/build/outputs/apk/release/kumo-*-test.apk
      - name: Cleanup
        if: always()
        run: rm -f Kumo/app/nube.p12
