name: Kumo Search and Rescue
on:
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v6
      - name: Clone Kumo source
        run: |
          git clone --branch test https://github.com/nubesurrealista/Kumo.git
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Inject Task Dependency Fix
        run: |
          cat <<EOF >> Kumo/app/build.gradle.kts

          tasks.configureEach {
              if (name.startsWith("process") && name.endsWith("Resources")) {
                  dependsOn(project(":i18n").tasks.matching { it.name == "generateLocalesConfig" })
              }
          }
          EOF
      - name: Run I18N Generation Only
        run: |
          cd Kumo
          ./gradlew :i18n:generateLocalesConfig --no-build-cache
      - name: Find Locales Config File
        run: |
          echo "Buscando locales_config.xml en todo el proyecto..."
          find Kumo -name "locales_config.xml"
          echo "Buscando cualquier recurso XML generado en i18n..."
          find Kumo/i18n/build -name "*.xml" | head -n 20
      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 -d > Kumo/app/nube.p12
      - name: Build release APKs
        run: |
          cd Kumo
          ./gradlew assembleRelease \
            --stacktrace \
            --parallel \
            --max-workers=$(nproc) \
            --no-build-cache \
            --no-daemon
