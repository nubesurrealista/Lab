name: Kumo locales diagnostic CLEAN

on:
  workflow_dispatch:

jobs:
  diagnostic-clean:
    runs-on: ubuntu-latest

    steps:
      - name: Clone Kumo source
        run: |
          git clone --branch test https://github.com/nubesurrealista/Kumo.git

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate locales config in clean env + find path
        run: |
          cd Kumo

          echo "=== Ejecutando clean + generación ==="
          ./gradlew clean :i18n:generateLocalesConfig \
            --no-build-cache \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace \
            --info

          echo "=== Ruta del archivo generado (find completo) ==="
          find . -name "locales_config.xml" -type f -exec echo "→ {}" \; -exec head -n 10 {} \;

          echo "=== Directorios generated relevantes ==="
          ls -la build/generated 2>/dev/null || echo "No hay build/generated"
          find build -path "*generated*" -type d | head -20

          echo "=== Log con --info (últimas líneas relevantes) ==="
          grep -iE "generateLocalesConfig|locales_config|generated|mihon|res/xml" build/reports/problems/problems-report.html || echo "No matches in problems report"
