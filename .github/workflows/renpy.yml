---
name: Build RenPy Native on Alpine
on:
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    container: alpine:latest
    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      XDG_RUNTIME_DIR: /tmp/runtime-root
      UV_LINK_MODE: copy
    steps:
      - name: Prepare runtime environment
        shell: sh
        run: |
          mkdir -p /tmp/runtime-root
          chmod 700 /tmp/runtime-root
      - name: Install System Dependencies
        shell: sh
        run: |
          apk update
          apk add --no-cache build-base git python3-dev sdl2-dev sdl2_image-dev sdl2_mixer-dev sdl2_ttf-dev sdl2_gfx-dev ffmpeg-dev freetype-dev harfbuzz-dev fribidi-dev libjpeg-turbo-dev mesa-dev glu-dev assimp-dev pkgconf uv bash
      - name: Checkout RenPy repository
        uses: actions/checkout@v6
        with:
          repository: renpy/renpy
          fetch-depth: 0
      - name: Checkout latest tag and submodules
        shell: sh
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          LATEST_TAG=$(git describe --tags --abbrev=0)
          git checkout $LATEST_TAG
          git submodule update --init --recursive
          echo "RENPY_TAG=$LATEST_TAG" >> $GITHUB_ENV
      - name: Build RenPy Modules
        shell: bash
        run: |
          uv sync
          export RENPY_CYTHON=cython
          ./run.sh --compile
      - name: Optimize and Prepare Distribution
        shell: sh
        run: |
          mkdir -p dist
          cp -r renpy.py renpy/ lib/ dist/
          find dist -name "*.c" -delete
          find dist -name "*.pyo" -delete
          find dist -name "*.so" -exec strip {} +
      - name: Upload Native Build
        uses: actions/upload-artifact@v7
        with:
          name: renpy-alpine-musl-${{ env.RENPY_TAG }}
          path: dist/
          if-no-files-found: error
