name: Build MoeKey for Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest
    container: debian:latest
    steps:
      - name: Install Basic Dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            curl \
            unzip \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            clang \
            gcc \
            g++ \
            libgtk-3-dev \
            libblkid-dev \
            liblzma-dev \
            libmpv-dev \
            mpv

      - name: Clone Repository
        run: git clone https://github.com/MoeKeyDev/MoeKey.git .

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 /flutter
          echo "/flutter/bin" >> $GITHUB_PATH

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Run Code Generator
        run: dart run build_runner build

      - name: Build Release (Software Rendering)
        run: flutter build linux --release --enable-software-rendering

      - name: Compress Bundle
        run: |
          tar -zcvf "MoeKey-linux-x86_64-release.tar.gz" \
          --directory=build/linux/x64/release/bundle .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: moekey-linux-build
          path: "MoeKey-linux-x86_64-release.tar.gz"
