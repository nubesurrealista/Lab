name: Build InstallerX

on:
  workflow_dispatch:  # Ejecución manual sin parámetros

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          repository: nubesurrealista/InstallerX-Revived
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Setup Signing Keys
        run: |
          mkdir -p keystore
          echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 -d > keystore/nube.p12
          cat <<EOF > keystore.properties
          storeFile=keystore/nube.p12
          storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
          keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}
          EOF

      - name: Extract Version Name  # Extrae la versión del build.gradle.kts
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | cut -d '"' -f 2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build APK (ARMv7 only)
        run: ./gradlew assembleStableRelease -PabiFilters=armeabi-v7a

      - name: Rename APK
        run: |
          APK_PATH=$(ls app/build/outputs/apk/Stable/release/*armeabi-v7a*.apk)
          mv "$APK_PATH" "app/build/outputs/apk/Stable/release/InstallerX-Revived-${{ steps.version.outputs.version }}-armeabi-v7a.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: installerx-armv7-apk
          path: app/build/outputs/apk/Stable/release/*.apk
          if-no-files-found: error
