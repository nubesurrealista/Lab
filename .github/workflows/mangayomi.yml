name: Build Mangayomi (Debian + Flutter + Rust)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: debian:stable-slim

    steps:
      - name: 🧰 Instalar dependencias base
        run: |
          apt update
          apt install -y \
            curl git unzip xz-utils zip \
            build-essential clang cmake pkg-config \
            libgtk-3-dev liblzma-dev libgl1-mesa-dev \
            libglu1-mesa libgdk-pixbuf2.0-dev \
            libssl-dev libclang-dev python3 python3-pip

      - name: 🐍 Instalar Flutter SDK
        run: |
          curl -O https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.22.0-stable.tar.xz
          tar xf flutter_linux_3.22.0-stable.tar.xz
          mv flutter /opt/flutter
          echo 'export PATH="/opt/flutter/bin:$PATH"' >> $GITHUB_ENV
          /opt/flutter/bin/flutter doctor

      - name: 🦀 Instalar Rust y flutter_rust_bridge_codegen
        run: |
          curl https://sh.rustup.rs -sSf | bash -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source $HOME/.cargo/env
          cargo install flutter_rust_bridge_codegen

      - name: 📥 Clonar Mangayomi
        run: |
          git clone https://github.com/kodjodevf/mangayomi.git
          cd mangayomi
          flutter pub get

      - name: 🔧 Generar puente Rust ↔️ Flutter
        working-directory: mangayomi
        run: flutter_rust_bridge_codegen generate

      - name: 🏗️ Compilar Mangayomi (Linux)
        working-directory: mangayomi
        run: flutter build linux

      - name: 📤 Subir binario compilado
        uses: actions/upload-artifact@v4
        with:
          name: mangayomi-linux
          path: mangayomi/build/linux/x64/release/bundle
