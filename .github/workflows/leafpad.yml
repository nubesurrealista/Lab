name: Build Leafpad (Manual Dispatch)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Clone Leafpad repository
        run: |
          git clone https://github.com/tarot231/leafpad.git
          cd leafpad

      - name: 🧰 Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            autoconf automake intltool \
            libgtk2.0-dev libglib2.0-dev \
            build-essential gettext

      - name: 🔧 Prepare build system
        working-directory: leafpad
        run: autoreconf -i

      - name: ⚙️ Configure project
        working-directory: leafpad
        run: ./configure

      - name: 🏗️ Compile Leafpad
        working-directory: leafpad
        run: make

      - name: 📤 Upload compiled binary
        uses: actions/upload-artifact@v4
        with:
          name: leafpad
          path: leafpad/src/leafpad
