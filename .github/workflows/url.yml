---
name: Build & Sign URLSanitizer APK (external signing)
on:
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4
      - name: Clone URLSanitizer source
        run: git clone --depth 1
          https://github.com/nubesurrealista/android_URLSanitizer.git
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build unsigned release APK
        run: |
          cd android_URLSanitizer
          ./gradlew assembleRelease --stacktrace
      - name: List APKs (unsigned)
        run: find android_URLSanitizer/app/build/outputs/apk -type f -name "*.apk"
      - name: Sign APK using apksigner
        run: >
          # Busca el APK release (puede variar según el proyecto)

          APK_PATH=$(find android_URLSanitizer/app/build/outputs/apk/release -name "*.apk" ! -name "*unaligned*" | head -n 1)

          if [ ! -f "$APK_PATH" ]; then
            echo "::error::No se encontró el APK release"
            exit 1
          fi

          echo "APK encontrado en: $APK_PATH"


          # Decodificar keystore temporalmente

          echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 -d > /tmp/nube.p12


          # Firmar el APK

          "$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -n1)/apksigner" sign \
            --ks /tmp/nube.p12 \
            --ks-key-alias "${{ secrets.RELEASE_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.RELEASE_KEY_PASSWORD }}" \
            --out url-sanitizer-release-signed.apk \
            "$APK_PATH"

          # Limpiar keystore

          rm -f /tmp/nube.p12
      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: urlsanitizer-release-apk
          path: url-sanitizer-release-signed.apk
          if-no-files-found: error
