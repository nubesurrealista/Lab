---
name: Build & Sign URLSanitizer APK
on:
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Clone URLSanitizer source
        run: >
          git clone --depth 1
          https://github.com/nubesurrealista/android_URLSanitizer.git

      - name: Set up JDK 17  # Updated from Java 11 to Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode keystore
        run: >
          mkdir -p android_URLSanitizer/app
          echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 -d > android_URLSanitizer/app/nube.p12

      - name: Create release signing properties
        run: >
          echo "storeFile=nube.p12" > android_URLSanitizer/app/release-signing.properties
          echo "storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> android_URLSanitizer/app/release-signing.properties
          echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}" >> android_URLSanitizer/app/release-signing.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> android_URLSanitizer/app/release-signing.properties

      - name: Ensure Gradle Wrapper is executable
        run: chmod +x ./android_URLSanitizer/gradlew

      - name: Modify build.gradle for signing
        run: >
          cd android_URLSanitizer/app

          # Inyectar signingConfigs si no existen
          if ! grep -q 'signingConfigs' build.gradle; then
            echo "Injecting signingConfigs..."
            sed -i '/android {/a \
            def keystorePropertiesFile = file("release-signing.properties")\
            def keystoreProperties = new Properties()\
            if (keystorePropertiesFile.exists()) {\
                keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\
            }\
            signingConfigs {\
                release {\
                    storeFile file(keystoreProperties["storeFile"])\
                    storePassword keystoreProperties["storePassword"]\
                    keyAlias keystoreProperties["keyAlias"]\
                    keyPassword keystoreProperties["keyPassword"]\
                }\
            }' build.gradle
          fi

          # Configurar signingConfig para release
          if ! grep -q 'signingConfig signingConfigs.release' build.gradle; then
            echo "Configuring release signing..."
            sed -i '/buildTypes {/a \
            release {\
                signingConfig signingConfigs.release\
            }' build.gradle
          fi

      - name: Build release APK (with stacktrace)
        run: |
          cd android_URLSanitizer
          ./gradlew :app:assembleRelease --stacktrace

      - name: Collect APKs
        run: >
          mkdir -p apk-out
          find android_URLSanitizer/app/build/outputs/apk -type f -name "*.apk" -exec cp {} apk-out/ \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: urlsanitizer-release-apk
          path: apk-out/*.apk
          if-no-files-found: warn