---
name: Build SuperTux for Alpine Linux (musl)
on:
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    steps:
      - name: Install build dependencies (apk)
        run: |
          apk add --no-cache \
            build-base \
            cmake \
            git \
            sdl2-dev \
            sdl2_image-dev \
            sdl2_ttf-dev \
            boost-dev \
            physfs-dev \
            curl-dev \
            glew-dev \
            glm-dev \
            freetype-dev \
            libvorbis-dev \
            openal-soft-dev \
            libogg-dev \
            zlib-dev \
            fmt-dev \
            harfbuzz-dev \
            fribidi-dev \
            libpng-dev \
            patch
      - name: Clone SuperTux + submodules
        uses: actions/checkout@v6
        with:
          repository: SuperTux/supertux
          submodules: recursive
          path: supertux
      - name: Apply patches for musl compatibility
        working-directory: supertux
        run: |
          cat > /tmp/zip_manager.patch <<-'EOF'
          diff --git a/external/partio_zip/zip_manager.hpp b/external/partio_zip/zip_manager.hpp
          --- a/external/partio_zip/zip_manager.hpp
          +++ b/external/partio_zip/zip_manager.hpp
          @@ -44,6 +44,7 @@
           #include <fstream>
           #include <iostream>
           #include <map>
          +#include <memory>
           #include <string>
           #include <stdexcept>
           #include <vector>
          EOF
          patch -p1 < /tmp/zip_manager.patch

          cat > /tmp/cfloat.patch <<-'EOF'
          diff --git a/src/supertux/game_session.cpp b/src/supertux/game_session.cpp
          --- a/src/supertux/game_session.cpp
          +++ b/src/supertux/game_session.cpp
          @@ -14,6 +14,8 @@
           // You should have received a copy of the GNU General Public License
           // along with this program. If not, see <http://www.gnu.org/licenses/>.
          +#include <cfloat>
          +
           #include "supertux/game_session.hpp"
           #include "audio/sound_manager.hpp"
          EOF
          patch -p1 < /tmp/cfloat.patch

          cat > /tmp/execinfo.patch <<-'EOF'
          diff --git a/src/supertux/error_handler.cpp b/src/supertux/error_handler.cpp
          --- a/src/supertux/error_handler.cpp
          +++ b/src/supertux/error_handler.cpp
          @@ -50,7 +50,7 @@
           #include <signal.h>
           #include <stdlib.h>
           
          -#if defined(__GNUC__) && !defined(__ANDROID__) && !defined(__EMSCRIPTEN__) && !defined(__APPLE__)
          +#if defined(__GNUC__) && defined(__GLIBC__) && !defined(__ANDROID__) && !defined(__EMSCRIPTEN__) && !defined(__APPLE__)
           #include <execinfo.h>
           #endif
          EOF
          patch -p1 < /tmp/execinfo.patch
      - name: Configure and build (Release)
        working-directory: supertux
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_OPENGL=ON \
            -DUSE_SYSTEM_SDL2_TTF=ON
          cmake --build . -- -j$(nproc)
      - name: Verify compiled binary
        working-directory: supertux/build
        run: |
          ls -lh supertux2
          file supertux2
          echo "Build successful for Alpine musl."
      - name: Upload artifact (compiled binary)
        uses: actions/upload-artifact@v7
        with:
          name: supertux2-alpine-musl
          path: supertux/build/supertux2
