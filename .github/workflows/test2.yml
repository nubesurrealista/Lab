---
name: Mega Folder Processor
on:
  workflow_dispatch: null
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: 1 - Setup environment
        run: |
          echo "::add-mask::${{ secrets.SOURCE_ENTRY }}"
          sudo apt-get update
          sudo apt-get install -y megatools ffmpeg unrar zip
          echo "🛠️ Dependencias instaladas"

      - name: 2 - Download only root RAR files from Mega folder
        run: |
          mkdir -p payload
          cd payload
          
          echo "📥 Descargando solo archivos RAR de la carpeta Mega..."
          megatools dl --no-progress --path . \
            --include-type "file" \
            --pattern "*.rar" \
            "${{ secrets.SOURCE_ENTRY }}"
          
          echo "✅ Descarga completada"
          ls -lh

      - name: 3 - Verify RAR downloads
        run: |
          cd payload
          RAR_COUNT=$(find . -maxdepth 1 -type f -iname "*.rar" | wc -l)
          if [ "$RAR_COUNT" -eq 0 ]; then
            echo "❌ Error: No se encontraron archivos RAR descargados"
            exit 1
          else
            echo "✔️ Encontrados $RAR_COUNT archivos RAR"
          fi

      - name: 4 - Extract RAR files
        run: |
          cd payload
          echo "🧩 Extrayendo archivos RAR..."
          find . -maxdepth 1 -type f -iname "*.rar" -exec unrar x -o+ {} \;
          echo "🎉 Extracción completada"
          ls -lh

      - name: 5 - Find and process video
        run: >
          cd payload

          FILE=$(find . -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" \) | head -n 1)

          if [ -z "$FILE" ]; then
            echo "❌ No se encontró ningún archivo de video válido"
            echo "Contenido del directorio:"
            ls -R
            exit 1
          fi

          NAME=$(basename "$FILE")
          BASE="${NAME%.*}"

          echo "::add-mask::$FILE"
          echo "::add-mask::$NAME"
          echo "::add-mask::$BASE"

          ffmpeg -i "$FILE" \
            -vf "scale=-2:720" \
            -map 0 \
            -c:v libx264 -preset fast -crf 23 -threads 2 \
            -c:a aac -b:a 128k \
            -c:s copy \
            "../${BASE}_720p.mkv"

      - name: 6 - Package result
        run: |
          mkdir -p final
          mv payload/*.mkv final/
          cd final
          echo "📦 Creando ZIP protegido..."
          zip -P "${{ secrets.ZIP_PASSWORD }}" ../test.zip *
          cd ..
          echo "::add-mask::${{ secrets.ZIP_PASSWORD }}"

      - name: 7 - Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-bundle
          path: test.zip