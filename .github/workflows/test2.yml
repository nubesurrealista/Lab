---
name: Mega Download and Convert (Full Logs)
on:
  workflow_dispatch: null
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Instalación sin restricciones
      - name: 1 - Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tor torsocks megatools ffmpeg unrar zip
          echo "Versión de megatools:"
          megatools --version
          echo "Versión de ffmpeg:"
          ffmpeg -version | head -n 1

      # Paso 2: Configuración de Tor con logs visibles
      - name: 2 - Configure Tor
        run: |
          sudo bash -c 'cat > /etc/tor/torrc << EOL
          ControlPort 9051
          SocksPort 9050
          RunAsDaemon 1
          Log notice file /var/log/tor/notices.log
          EOL'
          
          sudo service tor restart
          sleep 3
          echo "=== Estado de Tor ==="
          sudo service tor status
          echo "=== IP inicial ==="
          torsocks curl -s ifconfig.me

      # Paso 3: Descarga con logs completos
      - name: 3 - Download from Mega (Full Output)
        run: |
          mkdir -p payload
          cd payload
          
          echo "=== Rotando IP ==="
          echo -e "AUTHENTICATE \"\"\r\nSIGNAL NEWNYM\r\nQUIT" | nc localhost 9051
          echo "=== Nueva IP ==="
          torsocks curl -s ifconfig.me
          
          echo "=== Iniciando descarga Mega ==="
          torsocks megatools dl --path . "${{ secrets.SOURCE_ENTRY }}"
          
          echo "=== Contenido descargado ==="
          ls -lh
          echo "=== Estructura de carpetas ==="
          tree -L 2

      # Paso 4: Procesamiento con logs detallados
      - name: 4 - Process Files
        run: |
          cd payload
          
          echo "=== Buscando archivos RAR ==="
          find . -type f -iname "*.rar" -o -iname "*.part*.rar"
          
          echo "=== Extrayendo ==="
          for rar in $(find . -type f \( -iname "*.rar" -o -iname "*.part*.rar" \)); do
            echo "Extrayendo: $rar"
            unrar x -o+ "$rar"
          done
          
          echo "=== Buscando videos ==="
          find . -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" \) -exec ls -lh {} \;
          
          VIDEO=$(find . -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" \) | head -n 1)
          [ -z "$VIDEO" ] && echo "ERROR: No se encontró video" && exit 1
          
          echo "=== Convirtiendo $VIDEO ==="
          ffmpeg -i "$VIDEO" \
            -vf "scale=-2:720" \
            -c:v libx264 -preset fast -crf 23 \
            -c:a aac -b:a 128k \
            -c:s copy \
            "../output_720p.mkv"
          
          echo "=== Archivo convertido ==="
          ls -lh ../output_720p.mkv

      # Paso 5: Empaquetado y upload
      - name: 5 - Package and Upload
        run: |
          echo "=== Comprimiendo ==="
          zip -P "${{ secrets.ZIP_PASSWORD }}" final_output.zip output_720p.mkv
          
          echo "=== Subiendo artefacto ==="
          ls -lh final_output.zip

      - name: 6 - Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-video
          path: final_output.zip