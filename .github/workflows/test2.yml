---
name: Mega Multi-File Processor
on:
  workflow_dispatch: null
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: 1 - Setup environment
        run: |
          echo "::add-mask::${{ secrets.SOURCE_ENTRY }}"
          sudo apt-get update
          sudo apt-get install -y megatools ffmpeg unrar zip pv
          echo "🛠️ Dependencias instaladas"

      - name: 2 - Download multiple files from Mega
        run: |
          mkdir -p payload
          cd payload
          
          # Convertir el secreto en array (soporta múltiples URLs separadas por espacios o saltos de línea)
          IFS=$'\n' read -d '' -r -a MEGA_LINKS <<< "$(echo "${{ secrets.SOURCE_ENTRY }}" | tr ' ' '\n')"
          
          echo "📥 Descargando ${#MEGA_LINKS[@]} archivos desde Mega..."
          
          for LINK in "${MEGA_LINKS[@]}"; do
            if [ -n "$LINK" ]; then
              echo "⬇️ Descargando archivo..."
              megatools dl --path . "$LINK"
              echo "✅ Descarga parcial completada"
            fi
          done
          
          echo "✔️ Todas las descargas completadas"
          ls -lh

      - name: 3 - Process RAR files if needed
        run: |
          cd payload
          # Buscar archivos RAR (por si los links descargaron partes comprimidas)
          RAR_FILES=$(find . -type f -iname "*.rar")
          
          if [ -n "$RAR_FILES" ]; then
            echo "🧩 Encontrados archivos RAR, extrayendo..."
            for RAR_FILE in $RAR_FILES; do
              unrar x -o+ "$RAR_FILE"
            done
            echo "🎉 Extracción completada"
          fi

      - name: 4 - Find and process video
        run: >
          cd payload

          FILE=$(find . -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" \) | head -n 1)

          if [ -z "$FILE" ]; then exit 1; fi

          NAME=$(basename "$FILE")

          BASE="${NAME%.*}"

          echo "::add-mask::$FILE"

          echo "::add-mask::$NAME"

          echo "::add-mask::$BASE"

          ffmpeg -i "$FILE" \
            -vf "scale=-2:720" \
            -map 0 \
            -c:v libx264 -preset fast -crf 23 -threads 2 \
            -c:a aac -b:a 128k \
            -c:s copy \
            "../${BASE}_720p.mkv"

      - name: 5 - Package result
        run: |
          mkdir final
          mv ./*.mkv final/
          cd final
          echo "📦 Creando ZIP protegido..."
          zip -P "${{ secrets.ZIP_PASSWORD }}" ../test.zip *
          cd ..
          echo "::add-mask::${{ secrets.ZIP_PASSWORD }}"

      - name: 6 - Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-bundle
          path: test.zip