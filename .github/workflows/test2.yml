---
name: Mega Downloader with Tor Fixed
on:
  workflow_dispatch: null
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: 1 - Install and configure Tor properly
        run: |
          echo "🛠️ Instalando Tor y dependencias..."
          sudo apt-get update
          sudo apt-get install -y tor torsocks megatools
          
          echo "🔧 Configurando Tor..."
          sudo bash -c 'cat > /etc/tor/torrc << EOL
          ControlPort 9051
          HashedControlPassword $(tor --hash-password "githubtor" | tail -n 1)
          SocksPort 9050
          RunAsDaemon 1
          EOL'
          
          echo "🚀 Iniciando servicio Tor..."
          sudo service tor restart
          sleep 5  # Esperar a que Tor se inicie completamente
          
          echo "🔍 Verificando conexión Tor..."
          curl --socks5-hostname localhost:9050 -s https://check.torproject.org/api/ip | jq -r '.IsTor,.IP'
          echo "✅ Tor configurado correctamente"

      - name: 2 - Download from Mega with Tor
        run: |
          mkdir -p payload
          cd payload
          
          echo "🔄 Rotando IP de Tor..."
          tor_control_password="githubtor"
          echo -e "AUTHENTICATE \"$tor_control_password\"\r\nSIGNAL NEWNYM\r\nQUIT" | \
            nc localhost 9051
          
          echo "🌐 Nueva IP: $(torsocks curl -s ifconfig.me)"
          
          echo "📥 Descargando desde Mega con Tor..."
          set +e
          torsocks megatools dl --path . "${{ secrets.SOURCE_ENTRY }}" 2>&1 | \
            grep -E --line-buffered 'Downloading|Progress|ERROR|WARNING' | \
            while read -r line; do
              echo "📡 ${line:0:120}"
            done
          set -e
          
          echo "✅ Descarga completada"
          echo "📂 Archivos descargados: $(ls -1 | wc -l)"
          ls -lh | awk '{print $5, $9}' | grep -v '^total'

      - name: 3 - Filter and process RAR files
        run: |
          cd payload
          echo "🔍 Filtrando archivos RAR..."
          
          # Crear lista segura de archivos
          echo "📋 Contenido inicial:"
          find . -maxdepth 1 -type f -exec basename {} \; | \
            while read -r file; do
              size=$(du -h "$file" | cut -f1)
              echo "• $size ${file:0:30}..."
            done
          
          # Filtrar RARs
          mkdir -p temp_rars
          find . -maxdepth 1 -type f \( -iname "*.rar" -o -iname "*.part*.rar" \) -exec mv {} temp_rars/ \;
          
          echo "📦 Archivos RAR encontrados: $(ls -1 temp_rars/ | wc -l)"
          shopt -s extglob
          rm -rf !("temp_rars")
          mv temp_rars/* .
          rmdir temp_rars
          shopt -u extglob
          
          echo "✅ Filtrado completado"
          echo "📝 Archivos finales:"
          ls -1 | while read -r file; do
            echo "• $(du -h "$file" | cut -f1) ${file:0:30}..."
          done