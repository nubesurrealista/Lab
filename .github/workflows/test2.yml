---
name: Mega Processor (Arch Linux Container)
on:
  workflow_dispatch: null
jobs:
  process:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --volume ${{ github.workspace }}/data:/data
    steps:
      # Paso 1: Configuración del contenedor
      - name: Setup Arch Linux
        run: |
          pacman -Syu --noconfirm --needed base-devel git \
            megatools ffmpeg unrar zip tor torsocks nc tree jq pv
          
          # Configurar Tor
          echo 'ControlPort 9051\nSocksPort 9050\nLog notice stdout' >> /etc/tor/torrc
          systemctl start tor
          echo "🌐 IP: $(torsocks curl -s ifconfig.me)"

      # Paso 2: Procesamiento en directorio compartido
      - name: Process Files
        run: |
          mkdir -p /data/payload
          cd /data/payload
          
          # Rotar IP Tor
          echo -e "AUTHENTICATE \"\"\r\nSIGNAL NEWNYM\r\nQUIT" | nc -w 5 localhost 9051
          
          # Descargar
          torsocks megatools dl --path . "${{ secrets.SOURCE_ENTRY }}"
          
          # Procesar RARs
          find . -maxdepth 1 -type f \( -iname "*.rar" -o -iname "*.part*.rar" \) -exec unrar x -o+ {} \;
          
          # Convertir video
          VIDEO=$(find . -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" \) | head -n 1)
          ffmpeg -i "$VIDEO" \
            -vf "scale=-2:720" \
            -c:v libx264 -preset fast -crf 23 \
            -c:a aac -b:a 128k \
            -c:s copy \
            "/data/output_720p.mkv"

      # Paso 3: Empaquetado y subida
      - name: Package Result
        run: |
          cd /data
          zip -P "${{ secrets.ZIP_PASSWORD }}" final_output.zip output_720p.mkv
          echo "::add-mask::${{ secrets.ZIP_PASSWORD }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-video
          path: ${{ github.workspace }}/data/final_output.zip
          retention-days: 1