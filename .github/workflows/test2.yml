---
name: Mega Processor (Arch Linux + AUR)
on:
  workflow_dispatch: null
jobs:
  process:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --volume ${{ github.workspace }}/data:/data
    steps:
      - name: Setup system
        run: |
          pacman -Syu --noconfirm --needed base-devel git gnu-netcat \
            ffmpeg unrar zip tor torsocks pv sudo
      - name: Install megatools from AUR
        run: |
          # Crear usuario no-root
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          # Instalar como usuario builder
          su builder -c '
            cd ~
            git clone https://aur.archlinux.org/megatools.git
            cd megatools
            makepkg -si --noconfirm
          '

          # Verificar instalación
          echo "✅ Versión instalada:"
          megatools --version
      - name: Configure Tor
        run: |
          echo "SocksPort 9050" >> /etc/tor/torrc
          echo "ControlPort 9051" >> /etc/tor/torrc
          systemctl start tor
          sleep 3
          echo "🌐 IP Tor: $(torsocks curl -s ifconfig.me)"
      - name: Download and filter
        run: >
          mkdir -p /data/payload

          cd /data/payload


          echo -e "AUTHENTICATE \"\"\r\nSIGNAL NEWNYM\r\nQUIT" | nc -w 5 localhost 9051


          torsocks megatools dl --path . "${{ secrets.SOURCE_ENTRY }}"


          # Filtrar solo archivos específicos en raíz

          mkdir -p /data/filtered

          find . -maxdepth 1 -type f \( -iname "K9 and Company.part*.rar" \) -exec mv {} /data/filtered/ \;


          rm -rf *

          mv /data/filtered/* .

          rmdir /data/filtered


          echo "📦 Archivos filtrados:"

          ls -lh
      - name: Extract and convert
        run: >
          cd /data/payload

          for rar in *.rar; do
            unrar x -o+ "$rar"
          done


          VIDEO=$(find . -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" \) | head -n 1)

          ffmpeg -i "$VIDEO" \
            -vf "scale=-2:720" \
            -c:v libx264 -preset fast -crf 23 \
            -c:a aac -b:a 128k \
            -c:s copy \
            "/data/output_720p.mkv"
      - name: Package result
        run: |
          cd /data
          zip -P "${{ secrets.ZIP_PASSWORD }}" final_output.zip output_720p.mkv
          echo "::add-mask::${{ secrets.ZIP_PASSWORD }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-video
          path: /data/final_output.zip
