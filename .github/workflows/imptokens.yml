name: Build imptokens Static Binary
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: clux/muslrust:stable
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: nimhar/imptokens
          path: imptokens

      - name: Build
        shell: sh
        run: |
          cd imptokens
          cargo build --release
          strip target/x86_64-unknown-linux-musl/release/imptokens

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: imptokens-static-binary
          path: imptokens/target/x86_64-unknown-linux-musl/release/imptokens
