name: Build Audio Share on Alpine
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: alpine:latest
    env:
      HOME: /root
    steps:
      - name: Install system dependencies
        shell: sh
        run: |
          apk update
          apk add --no-cache \
            git \
            build-base \
            cmake \
            pipewire-dev \
            asio-dev \
            protobuf-dev \
            spdlog-dev \
            cxxopts-dev \
            nlohmann-json \
            doas
          echo "permit nopass root" > /etc/doas.conf

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: mkckr0/audio-share
          submodules: recursive

      - name: Build Server CMD
        shell: sh
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DAUDIO_SHARE_BUILD_SERVER_CMD=ON \
            -DAUDIO_SHARE_BUILD_SERVER_MFC=OFF \
            -DAUDIO_SHARE_USE_VCPKG=OFF
          make as-cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-share-alpine-binary
          path: build/server-cmd/as-cmd
