name: Build Audio Share server-core on Alpine musl

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - name: Install system dependencies
        run: |
          apk update
          apk add --no-cache \
            git \
            cmake \
            ninja \
            build-base \
            pkgconf \
            pipewire-dev \
            protobuf-dev \
            spdlog-dev \
            cxxopts-dev \
            asio-dev

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: mkckr0/audio-share
          submodules: recursive

      - name: Patch CMakeLists.txt
        run: |
          cd server-core
          cat >> CMakeLists.txt << 'EOF'

          find_path(ASIO_INCLUDE_DIR NAMES asio.hpp)
          if(ASIO_INCLUDE_DIR)
            add_library(asio::asio INTERFACE IMPORTED)
            target_include_directories(asio::asio INTERFACE ${ASIO_INCLUDE_DIR})
            message(STATUS "Using system asio: ${ASIO_INCLUDE_DIR}")
          else()
            message(FATAL_ERROR "asio.hpp not found")
          endif()
EOF
          sed -i '/find_package(asio CONFIG REQUIRED)/d' CMakeLists.txt

      - name: Configure and build
        run: |
          cd server-core
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DAUDIO_SHARE_STATIC_LIBCPP=ON \
            -DCMAKE_INSTALL_PREFIX=/usr/local

          cmake --build build --target server-cmd -j$(nproc)

      - name: Verify binary
        run: |
          cd server-core
          ls -lh build/as-cmd
          file build/as-cmd
          ldd build/as-cmd || echo "Binary appears static (libstdc++ static)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: as-cmd-alpine-musl
          path: server-core/build/as-cmd
