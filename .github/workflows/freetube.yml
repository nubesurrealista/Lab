name: Build FreeTube Alpine
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --user root
    steps:
      - name: Setup Repositories and Install
        run: |
          echo "https://dl-cdn.alpinelinux.org/alpine/edge/main" >> /etc/apk/repositories
          echo "https://dl-cdn.alpinelinux.org/alpine/edge/community" >> /etc/apk/repositories
          echo "https://dl-cdn.alpinelinux.org/alpine/edge/testing" >> /etc/apk/repositories
          apk update
          apk add --no-cache nodejs npm yarn git bash electron curl 7zip tree

      - name: Clone FreeTube
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/FreeTubeApp/FreeTube/tags | grep -m 1 name | cut -d '"' -f 4)
          git clone --branch ${LATEST_TAG} --depth 1 https://github.com/FreeTubeApp/FreeTube.git .

      - name: Prepare and Install Dependencies
        run: |
          yarn install --frozen-lockfile

      - name: Build ASAR
        run: |
          export ELECTRON_SKIP_BINARY_DOWNLOAD=1
          yarn run build
          
      - name: Create Portable Structure
        run: |
          mkdir -p dist/freetube-portable/resources
          
          ASAR_PATH=$(find build -name "app.asar" | head -n 1)
          cp "$ASAR_PATH" dist/freetube-portable/resources/
          
          cp /usr/bin/electron dist/freetube-portable/freetube
          chmod +x dist/freetube-portable/freetube
          
          cat <<EOF > dist/freetube-portable/freetube.sh
          #!/bin/sh
          HERE=\$(dirname "\$(readlink -f "\$0")")
          exec "\$HERE/freetube" "\$HERE/resources/app.asar" "\$@"
          EOF
          chmod +x dist/freetube-portable/freetube.sh

      - name: Fix Locales (Spanish Only)
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/FreeTubeApp/FreeTube/tags | grep -m 1 name | cut -d '"' -f 4)
          VERSION_NUM=$(echo $LATEST_TAG | sed 's/v//')
          URL="https://github.com/FreeTubeApp/FreeTube/releases/download/${LATEST_TAG}/freetube-${VERSION_NUM}-linux-x64-portable.zip"
          
          curl -L -o release.zip "$URL"
          7z x release.zip locales/es.pak locales/es-419.pak -o./temp_locales
          
          mkdir -p dist/freetube-portable/locales
          mv temp_locales/locales/*.pak dist/freetube-portable/locales/
          rm -rf temp_locales release.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeTube-Alpine-Portable
          path: dist/freetube-portable/
