name: Build Termusic with muslrust
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: clux/muslrust:stable
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: tramhao/termusic
          path: termusic

      - name: Install build dependencies
        shell: sh
        run: |
          apt-get update
          apt-get install -y protobuf-compiler libasound2-dev

      - name: Build
        shell: sh
        run: |
          cd termusic
          cargo build --release --all-features
          strip target/x86_64-unknown-linux-musl/release/termusic
          strip target/x86_64-unknown-linux-musl/release/termusic-server

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: termusic-static-binaries
          path: |
            termusic/target/x86_64-unknown-linux-musl/release/termusic
            termusic/target/x86_64-unknown-linux-musl/release/termusic-server
