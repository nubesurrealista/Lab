name: Build Joplin Alpine Native

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --user root

    steps:
      - name: Setup Repositories and Install Dependencies
        run: |
          echo "https://dl-cdn.alpinelinux.org/alpine/edge/main" >> /etc/apk/repositories
          echo "https://dl-cdn.alpinelinux.org/alpine/edge/community" >> /etc/apk/repositories
          echo "https://dl-cdn.alpinelinux.org/alpine/edge/testing" >> /etc/apk/repositories
          apk update
          apk add --no-cache nodejs npm git bash build-base python3 xz electron

          # ←←← ESTO ES LO QUE ARREGLA EL ERROR
          npm install -g corepack@latest
          corepack enable

      - name: Clone Repository
        run: |
          git clone --depth 1 https://github.com/laurent22/joplin.git .
          ls -la

      - name: Install Yarn Dependencies (monorepo)
        run: |
          yarn install --immutable --network-timeout 1000000

      - name: Build Unpacked Directory (usando Electron de Alpine)
        run: |
          export ELECTRON_PATH="/usr/lib/electron"
          SYSTEM_ELECTRON_VER=$(electron -v --no-sandbox | sed 's/v//')

          echo "Usando Electron Alpine v$SYSTEM_ELECTRON_VER"

          cd packages/app-desktop

          npx gulp before-dist
          ELECTRON_VERSION=$SYSTEM_ELECTRON_VER yarn electronRebuild
          npx electron-builder --linux --dir \
            -c.electronDist=$ELECTRON_PATH \
            -c.electronVersion=$SYSTEM_ELECTRON_VER

      - name: Create Final Tarball Native
        run: |
          mv packages/app-desktop/dist/linux-unpacked joplin-portable
          mv joplin-portable/joplin joplin-portable/joplin-alpine  # más claro
          tar -cJf joplin-alpine-native.tar.xz joplin-portable/

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Joplin-Alpine-Native
          path: joplin-alpine-native.tar.xz
