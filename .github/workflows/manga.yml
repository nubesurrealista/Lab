name: MangaReader CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout MangaReader
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: "25.1.8937393"
          cmake-version: "3.22.1"

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 -d > app/nube.p12
          chmod 600 app/nube.p12

      - name: Configure signing
        run: |
          cd app
          if ! grep -q 'signingConfigs' build.gradle.kts; then
            awk '
              /android[[:space:]]*{/ && !done {
                print
                print "    signingConfigs {"
                print "        create(\"release\") {"
                print "            storeFile = file(\"nube.p12\")"
                print "            storePassword = System.getenv(\"STORE_PASSWORD\")"
                print "            keyAlias = System.getenv(\"KEY_ALIAS\")"
                print "            keyPassword = System.getenv(\"KEY_PASSWORD\")"
                print "        }"
                print "    }"
                done = 1
                next
              }
              { print }
            ' build.gradle.kts > temp && mv temp build.gradle.kts
          fi
          sed -i '/release[[:space:]]*{/a\            signingConfig = signingConfigs.getByName(\"release\")' build.gradle.kts

      - name: Build release APK
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p apk-out
          find . -name "*.apk" -exec cp {} apk-out/ \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mangareader-release
          path: apk-out/*.apk

      - name: Clean sensitive files
        run: |
          rm -f app/nube.p12