name: Build Falkon

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_DIR: build
  ARTIFACT_NAME: falkon_binary
  ECM_VERSION: 5.240.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clone Falkon repository
      run: |
        git clone --recursive https://invent.kde.org/network/falkon.git falkon
        cd falkon

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          qtbase5-dev \
          qtdeclarative5-dev \
          qtwebengine5-dev \
          qtquickcontrols2-5-dev \
          libqt5svg5-dev \
          libkf5coreaddons-dev \
          libkf5i18n-dev \
          libkf5wallet-dev \
          libkf5config-dev \
          gettext \
          ninja-build

    - name: Install ECM from source
      run: |
        git clone https://invent.kde.org/frameworks/extra-cmake-modules.git
        cd extra-cmake-modules
        git checkout v${{ env.ECM_VERSION }}
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
        sudo make install
        cd ../..

    - name: Create build directory
      run: mkdir -p ${{ env.BUILD_DIR }}

    - name: Configure CMake
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        cmake ../falkon \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_FLAGS="-O3 -pipe -fPIC" \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DCMAKE_C_FLAGS="-O3 -pipe -fPIC" \
          -DBUILD_TESTING=OFF \
          -GNinja

    - name: Build with Ninja
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        ninja

    - name: Strip binary (reduce size)
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        strip -s src/falkon

    - name: Package binary
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        mkdir -p package
        cp src/falkon package/
        tar czf ${{ env.ARTIFACT_NAME }}.tar.gz package/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ${{ env.BUILD_DIR }}/${{ env.ARTIFACT_NAME }}.tar.gz
