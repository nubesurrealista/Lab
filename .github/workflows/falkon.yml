name: Build Falkon

on:
  workflow_dispatch:

env:
  BUILD_DIR: build
  ARTIFACT_NAME: falkon_binary
  ECM_VERSION: v6.16.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Falkon
      run: |
        git clone --depth=1 --branch=master --recursive https://invent.kde.org/network/falkon.git falkon
        cd falkon

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          qtbase5-dev \
          qtdeclarative5-dev \
          qtwebengine5-dev \
          qtquickcontrols2-5-dev \
          libqt5svg5-dev \
          libkf5coreaddons-dev \
          libkf5i18n-dev \
          libkf5wallet-dev \
          libkf5config-dev \
          gettext \
          libssl-dev \
          extra-cmake-modules

    - name: Install ECM (specific version)
      if: ${{ !contains(github.event.inputs.skip_ecm_install, 'true') }}
      run: |
        git clone --depth=1 https://invent.kde.org/frameworks/extra-cmake-modules.git
        cd extra-cmake-modules
        git checkout ${{ env.ECM_VERSION }}
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local -GNinja
        sudo ninja install
        cd ../..

    - name: Configure build
      run: |
        mkdir -p ${{ env.BUILD_DIR }}
        cd ${{ env.BUILD_DIR }}
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_FLAGS="-O3 -pipe -fPIC -flto=auto" \
          -DCMAKE_C_FLAGS="-O3 -pipe -fPIC -flto=auto" \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DBUILD_TESTING=OFF \
          -GNinja

    - name: Build Falkon
      run: |
        cd ${{ env.BUILD_DIR }}
        ninja -j$(nproc)

    - name: Optimize binary size
      run: |
        cd ${{ env.BUILD_DIR }}
        strip -s src/falkon
        upx --best --lzma src/falkon || echo "UPX not installed, skipping further compression"

    - name: Prepare artifact
      run: |
        mkdir -p package
        cp ${{ env.BUILD_DIR }}/src/falkon package/
        tar -czf ${{ env.ARTIFACT_NAME }}.tar.gz package/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ${{ env.ARTIFACT_NAME }}.tar.gz
        retention-days: 5
